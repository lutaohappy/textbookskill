name: 混合型（案例+知识+实践）
description: 兼顾案例导入、知识讲解和动手实践的综合性课程模板
sections:
  - heading: 学习目标
    type: objectives
    budget_ratio: 0.05
    write_task: 撰写三维学习目标（知识目标2-3条、技能目标2-3条、素养目标1-2条），每条20字以内。
  - heading: 案例教学
    type: case
    budget_ratio: 0.10
    write_task: 设计1个与本章核心技术相关的真实案例，包含业务背景、数据特征、方案实施和效果评估。
  - heading: 核心技术讲解
    type: knowledge
    budget_ratio: 0.25
    write_task: 3个技术点（任务描述→知识支撑→行动指南），每点含代码示例或配图。
  - heading: 技术方案设计
    type: design
    budget_ratio: 0.20
    write_task: 设计任务描述（项目背景+数据说明+任务要求+交付物）。
  - heading: 技术选型对比
    type: comparison
    budget_ratio: 0.10
    write_task: 制作方案比较表格（4-6个维度），给出选型建议。
  - heading: 任务实践
    type: experiment
    budget_ratio: 0.15
    write_task: 3-5个实践步骤，包含背景、步骤、验证方法。
  - heading: 自测题
    type: self_test
    budget_ratio: 0.05
    write_task: 3道选择题+2道思考题+1道实操题。
  - heading: 课后拓展
    type: case
    budget_ratio: 0.10
    optional: true
    write_task: 拓展阅读资料、延伸思考题、课外实践任务。
